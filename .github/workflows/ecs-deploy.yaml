name: Deploy HESP ECS Service

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infra
  ECR_REPO: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/hesp-api
  IMAGE_TAG: ${{ github.sha }}
  CLUSTER_NAME: hesp-dev-cluster
  SERVICE_NAME: hesp-api-svc

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/<DEPLOY_ROLE>

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $ECR_REPO

      - name: Build Docker image (linux/amd64)
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REPO:${IMAGE_TAG} \
            -t $ECR_REPO:latest \
            --push \
            .

      - name: Write image tag file
        run: echo "${IMAGE_TAG}" > image-tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image tag
        uses: actions/download-artifact@v4
        with:
          name: image-tag

      - name: Read image tag
        id: tag
        run: echo "tag=$(cat image-tag.txt)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/<DEPLOY_ROLE>

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -var="image_tag=${{ steps.tag.outputs.tag }}" -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Wait for ECS Deployment to Stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER_NAME \
            --services $SERVICE_NAME

      - name: Smoke Test - Hit /health endpoint
        run: |
          ALB_URL=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(DNSName, 'hesp')].DNSName" \
            --output text)

          echo "Calling https://$ALB_URL/health"

          curl -v --fail https://$ALB_URL/health
