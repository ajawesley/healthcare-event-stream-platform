name: CI

on:
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::045797643729:role/acme-github-oidc-deploy-role
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build ingestion service
        working-directory: cmd/ingest-service
        run: go build -o ingestion .

      - name: Build lambda
        working-directory: cmd/lambda
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap main.go
          zip lambda.zip bootstrap

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: infra/envs/dev
        run: terraform init -input=false
        env:
          TF_VAR_compliance_db_password: ${{ secrets.TF_VAR_compliance_db_password }}

      - name: Terraform Fmt
        working-directory: infra/envs/dev
        run: terraform fmt -check -recursive
        env:
          TF_VAR_compliance_db_password: ${{ secrets.TF_VAR_compliance_db_password }}

      - name: Terraform Validate
        working-directory: infra/envs/dev
        run: terraform validate
        env:
          TF_VAR_compliance_db_password: ${{ secrets.TF_VAR_compliance_db_password }}

      ############################################################
      # Policy-as-Code Layer (OPA, Checkov, Sentinel)
      ############################################################

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov (Terraform Security Scan)
        working-directory: infra/envs/dev
        run: checkov -d .

      - name: Install Conftest (OPA)
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/download/v0.52.0/conftest_0.52.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.52.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run OPA Conftest Policies
        working-directory: infra/envs/dev
        run: conftest test .

      - name: Run Sentinel Policies
        working-directory: infra/envs/dev
        run: |
          if [ -d "sentinel" ]; then
            echo "Running Sentinel policies..."
            sentinel apply -config=sentinel.hcl
          else
            echo "No Sentinel policies found. Skipping."
          fi

      ############################################################

      - name: Terraform Plan
        working-directory: infra/envs/dev
        run: terraform plan -no-color -out=tfplan || true
        env:
          TF_VAR_compliance_db_password: ${{ secrets.TF_VAR_compliance_db_password }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infra/envs/dev/tfplan
