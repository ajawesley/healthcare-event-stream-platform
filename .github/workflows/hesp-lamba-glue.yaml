name: HESP Lambda + Glue CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infra
  LAMBDA_BINARY: glue-trigger-lambda
  LAMBDA_ZIP: glue-trigger-lambda.zip

jobs:
  build:
    name: Build Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go test
        run: go test ./...

      - name: Build Lambda (linux/arm64)
        run: |
          cd cmd/glue-trigger-lambda
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o ${LAMBDA_BINARY}
          zip ${LAMBDA_ZIP} ${LAMBDA_BINARY}
          mv ${LAMBDA_ZIP} ../../${LAMBDA_ZIP}

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: ${{ env.LAMBDA_ZIP }}

  deploy:
    name: Deploy Infra (Terraform)
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan

  smoke:
    name: Smoke Test Lambda + Glue
    needs: deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Lambda (Glue trigger)
        run: |
          LAMBDA_NAME="${{ secrets.AWS_GLUE_TRIGGER_LAMBDA_NAME }}"
          PAYLOAD='{"test": "smoke"}'
          aws lambda invoke \
            --function-name "$LAMBDA_NAME" \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            /tmp/lambda-response.json

          cat /tmp/lambda-response.json

      - name: Verify Glue job started
        run: |
          GLUE_JOB_NAME="${{ secrets.AWS_GLUE_JOB_NAME }}"
          # Simple check: list last runs and ensure at least one recent
          aws glue get-job-runs --job-name "$GLUE_JOB_NAME" --max-results 1 > /tmp/glue-runs.json
          cat /tmp/glue-runs.json


